name: Build Windows Executable

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Generate icon
        shell: bash
        run: |
          python -c "from PIL import Image; img = Image.open('icons/airona.png'); img.save('icons/airona_clean.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])"

      - name: Build Executable with PyInstaller
        shell: cmd
        run: |
          pyinstaller --noconfirm --onedir --windowed ^
            --icon "icons/airona_clean.ico" ^
            --name "bpsr-fishing" ^
            --add-data "assets;assets" ^
            --add-data "icons;icons" ^
            --add-data "src;src" ^
            --hidden-import "src.tasks.FishingTask" ^
            --hidden-import "src.tasks.SRTriggerTask" ^
            --hidden-import "src.globals" ^
            --hidden-import "src.config" ^
            --hidden-import "src.downloader" ^
            --hidden-import "src.OpenVinoYolo8Detect" ^
            --hidden-import "src.OnnxYolo8Detect" ^
            --collect-all "ok" ^
            --collect-all "qfluentwidgets" ^
            --collect-all "openvino" ^
            --collect-all "onnxocr" ^
            --exclude-module "onnxruntime" ^
            --exclude-module "PySide6.Qt3DAnimation" ^
            --exclude-module "PySide6.Qt3DCore" ^
            --exclude-module "PySide6.Qt3DExtras" ^
            --exclude-module "PySide6.QtCharts" ^
            --exclude-module "PySide6.QtDataVisualization" ^
            --exclude-module "PySide6.QtWebEngineCore" ^
            --exclude-module "PySide6.QtWebEngineWidgets" ^
            --exclude-module "PySide6.QtMultimedia" ^
            --exclude-module "PySide6.QtMultimediaWidgets" ^
            main.py

      - name: Zip the application (without model)
        shell: pwsh
        run: |
          Compress-Archive -Path dist\bpsr-fishing\* -DestinationPath dist\bpsr-fishing-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpsr-fishing-windows
          path: dist/bpsr-fishing-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/bpsr-fishing-windows.zip
            assets/models/bpsr_splash.onnx
          generate_release_notes: true