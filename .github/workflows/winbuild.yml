name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-online:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with pyappify (online launcher)
        uses: ok-oldking/pyappify-action@master

      - name: Upload online installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpsr-fishing-online
          path: dist/*.zip

  build-offline:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with pyappify (offline bundle)
        uses: ok-oldking/pyappify-action@master
        with:
          offline: true

      - name: Upload offline bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpsr-fishing-offline
          path: dist/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-online, build-offline]
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download online installer
        uses: actions/download-artifact@v4
        with:
          name: bpsr-fishing-online
          path: release/

      - name: Download offline bundle
        uses: actions/download-artifact@v4
        with:
          name: bpsr-fishing-offline
          path: release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          body: |
            ## Installation

            | File | Size | Description |
            |------|------|-------------|
            | `*-online.zip` | ~3 MB | Downloads Python + deps on first launch. Recommended. |
            | `*-offline.zip` | ~180 MB | Everything pre-bundled. No internet needed at all. |

            ### Quick start (online installer — recommended)
            1. Download the `online` zip and extract anywhere with **English-only characters** in the path.
            2. Run `bpsr-fishing.exe` — it clones the repo and installs Python + deps automatically.
            3. The AI model (`bpsr_splash.onnx`) downloads on the very first run.