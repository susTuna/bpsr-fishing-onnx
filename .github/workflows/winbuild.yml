name: Build Windows Executable

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Clean Icon
        shell: bash
        run: |
          python -c "from PIL import Image; img = Image.open('icons/airona.png'); img.save('icons/airona_clean.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])"

      - name: Build Executable with Nuitka
        run: |
          python -m pip install nuitka
          python -m nuitka --standalone --output-dir=build --output-filename=bpsr-fishing.exe --enable-plugins=pyside6 --windows-console-mode=disable --windows-icon-from-ico=icons/airona_clean.ico --include-data-dir=assets=assets --include-data-dir=icons=icons --include-package=src --include-package=ok --assume-yes-for-downloads main.py

      - name: Zip the Application
        shell: pwsh
        run: |
          Compress-Archive -Path build\main.dist\* -DestinationPath build\bpsr-fishing-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpsr-fishing-windows
          path: build/bpsr-fishing-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/bpsr-fishing-windows.zip
          generate_release_notes: true
